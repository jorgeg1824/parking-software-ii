# ============================================================
# Cloud Build — Pipeline CI/CD
# ============================================================

steps:

  # ── Paso 1: Tests unitarios ───────────────────────────────
  - name: 'maven:3.9-eclipse-temurin-24'
    id: 'unit-tests'
    entrypoint: 'mvn'
    args:
      - 'test'
      - '-q'

  # ── Paso 2: SonarCloud ────────────────────────────────────
  - name: 'maven:3.9-eclipse-temurin-24'
    id: 'sonar-analysis'
    entrypoint: 'mvn'
    args:
      - 'sonar:sonar'
      - '-Dsonar.projectKey=jorgeg1824_parking-system'
      - '-Dsonar.organization=jorgeg1824'
      - '-Dsonar.host.url=https://sonarcloud.io'
      - '-Dsonar.token=$$SONAR_TOKEN'
    secretEnv:
      - 'SONAR_TOKEN'
    waitFor:
      - 'unit-tests'

  # ── Paso 3: Build Docker ──────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/parking-repo/parking-backend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/parking-repo/parking-backend:latest'
      - '.'
    waitFor:
      - 'sonar-analysis'

  # ── Paso 4: Push Artifact Registry ────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/parking-repo/parking-backend'
    waitFor:
      - 'build-image'

  # ── Paso 5: Deploy Cloud Run ──────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'parking-backend'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/parking-repo/parking-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--quiet'
    waitFor:
      - 'push-image'

# ── Secretos ────────────────────────────────────────────────
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/SONAR_TOKEN/versions/latest
      env: 'SONAR_TOKEN'

# ── Configuración ───────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'