# ============================================================
# Cloud Build — Pipeline CI/CD
# Se ejecuta automáticamente en cada push a main
#
# Pasos:
#   1. Tests unitarios del backend
#   2. Análisis estático con SonarCloud
#   3. Build de la imagen Docker del backend
#   4. Push al Artifact Registry
#   5. Deploy en Cloud Run
# ============================================================

steps:

  # ── Paso 1: Tests unitarios ──────────────────────────────────────────────
  - name: 'maven:3.9-eclipse-temurin-24'
    id: 'unit-tests'
    dir: 'backend'
    entrypoint: 'mvn'
    args: ['test', '-q']

  # ── Paso 2: Análisis estático SonarCloud ─────────────────────────────────
  - name: 'maven:3.9-eclipse-temurin-24'
    id: 'sonar-analysis'
    dir: 'backend'
    entrypoint: 'mvn'
    args:
      - 'sonar:sonar'
      - '-Dsonar.projectKey=jorgeg1824'
      - '-Dsonar.organization=jorgeg1824'
      - '-Dsonar.host.url=https://sonarcloud.io'
      - '-Dsonar.token=$$SONAR_TOKEN'
    secretEnv: ['SONAR_TOKEN']
    waitFor: ['unit-tests']

  # ── Paso 3: Build de la imagen Docker ────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    dir: 'backend'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/project-7bd198ee-ecbf-4324-bd0/parking-repo/parking-backend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/project-7bd198ee-ecbf-4324-bd0/parking-repo/parking-backend:latest'
      - '.'
    waitFor: ['sonar-analysis']

  # ── Paso 4: Push al Artifact Registry ────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/project-7bd198ee-ecbf-4324-bd0/parking-repo/parking-backend'
    waitFor: ['build-image']

  # ── Paso 5: Deploy en Cloud Run ──────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'parking-backend'
      - '--image=us-central1-docker.pkg.dev/project-7bd198ee-ecbf-4324-bd0/parking-repo/parking-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
    waitFor: ['push-image']

# ── Secretos desde Secret Manager ────────────────────────────────────────────
availableSecrets:
  secretManager:
    - versionName: projects/project-7bd198ee-ecbf-4324-bd0/secrets/SONAR_TOKEN/versions/latest
      env: 'SONAR_TOKEN'

# ── Configuración del pipeline ────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'